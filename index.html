<!DOCTYPE html>
<html lang="tr" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<title>Pro Soru Stüdyosu v13</title>
<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<!-- Kütüphaneler -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@latest/build/mp4-muxer.min.js"></script>
<!-- Fontlar -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:ital,wght@0,700;0,900;1,700;1,900&family=Oswald:wght@400;700&family=Bebas+Neue&family=Roboto+Condensed:ital,wght@0,700;1,700&family=Raleway:wght@700;900&family=Nunito:wght@700;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Anton&family=Poppins:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; background: #0f172a; }

/* ── Önizleme ── */
.preview-wrapper {
  width: 100%; aspect-ratio: 16/9;
  border-radius: 12px; overflow: hidden;
  border: 2px solid var(--bs-primary);
  box-shadow: 0 10px 32px rgba(0,0,0,.6);
  background: #000;
}
.live-editor-container {
  width:100%; height:100%;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  padding:5%; background-size:cover; background-position:center;
}
.q-capsule {
  background:#fff; width:85%;
  padding:2% 5%; border-radius:clamp(28px,5vw,60px);
  border:4px solid #1e293b; margin-bottom:3%;
}
.q-editable {
  background:transparent; width:100%; font-weight:900;
  color:#000; text-align:center; outline:none; min-height:1.2em;
  white-space:pre-wrap; word-break:break-word; overflow-wrap:break-word;
}
.q-editable:empty:before { content:attr(data-ph); color:#bbb; font-weight:400; }
.opt-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; width:85%; }
.opt-box {
  background:#fff; border:3px solid #cbd5e1;
  border-radius:clamp(22px,4vw,50px);
  display:flex; align-items:flex-start;
  padding:1.2% 3%; min-height:55px;
}
/* Doğru şık: Bootstrap success renkleri */
.opt-box.correct {
  border-color: #198754 !important;
  background: #d1e7dd !important;
}
.opt-box.correct .opt-circle { border-color:#198754; color:#198754; }
/* Belirsiz şık (doğru yok): Bootstrap light renkleri */
.opt-box.light-mode {
  border-color: #adb5bd !important;
  background: #f8f9fa !important;
}
.opt-circle {
  width:32px; height:32px; border:2px solid #000; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:1vw; font-weight:900; margin-right:10px; color:#000;
  flex-shrink:0; margin-top:.2em;
}
.opt-editable {
  background:transparent; width:100%; font-weight:700;
  color:#000; outline:none; min-height:1.2em;
  white-space:pre-wrap; word-break:break-word; overflow-wrap:break-word;
}
.opt-editable:empty:before { content:attr(data-ph); color:#bbb; font-weight:400; }

/* Doğru şık seçici — Bootstrap btn grubu */
.correct-btn-group .btn {
  font-weight: 700; letter-spacing: .3px;
}
.correct-btn-group .btn.active { box-shadow: 0 0 0 3px rgba(255,255,255,.25); }

/* Font dropdown panel */
.font-dd-panel {
  width: 520px;
}
.font-list {
  max-height: 190px; overflow-y:auto;
  display:flex; flex-direction:column; gap:2px;
}
.font-list::-webkit-scrollbar { width:4px; }
.font-list::-webkit-scrollbar-thumb { background:#334155; border-radius:4px; }
.font-opt {
  display:flex; align-items:center; gap:8px;
  padding:7px 10px; border-radius:8px; cursor:pointer;
  border:1px solid transparent; font-size:.84rem; font-weight:600;
  color: var(--bs-body-color); transition:all .12s;
}
.font-opt:hover { background: rgba(255,255,255,.06); }
.font-opt.active { background: rgba(99,102,241,.2); border-color:#6366f1; }
.font-opt .pchar { font-size:1.05rem; width:26px; text-align:center; }

/* Render alanı (ekran dışı) */
#render-stage { position:fixed; left:-9999px; top:0; pointer-events:none; visibility:visible; }
#video-canvas { position:fixed; left:-9999px; top:0; display:block; }

/* Progress */
#progressOverlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.88); z-index:9999;
  flex-direction:column; align-items:center; justify-content:center; gap:14px;
}
#progressOverlay.active { display:flex; }

/* Table row hover */
tr.q-row:hover { background: rgba(255,255,255,.04); cursor:pointer; }

/* Preview border accent */
.preview-accent { border-color: #6366f1 !important; }
</style>
</head>
<body>

<!-- Progress Overlay -->
<div id="progressOverlay">
  <p id="progressText" class="text-secondary mb-2">Hazırlanıyor...</p>
  <div class="progress" style="width:420px; height:12px;">
    <div id="progressFill" class="progress-bar progress-bar-striped progress-bar-animated bg-danger" style="width:0%"></div>
  </div>
</div>

<div class="container-fluid py-3" style="max-width:1420px;">

  <!-- ══ 1. Üst Bant: Excel + Export ══ -->
  <div class="row g-3 mb-3">

    <!-- Excel Kartı -->
    <div class="col-auto" style="min-width:220px;">
      <div class="card h-100">
        <div class="card-header py-2">
          <small class="text-uppercase text-muted fw-bold tracking-wide">
            <i class="bi bi-table me-1"></i>Veri & Excel
          </small>
        </div>
        <div class="card-body d-flex flex-column gap-2">
          <button class="btn btn-primary btn-sm" onclick="document.getElementById('fileIn').click()">
            <i class="bi bi-upload"></i> Excel Yükle
          </button>
          <button class="btn btn-secondary btn-sm" onclick="exportToExcel()">
            <i class="bi bi-download"></i> Excel Yedek
          </button>
          <button class="btn btn-danger btn-sm" onclick="clearAll()">
            <i class="bi bi-trash3"></i> Tümünü Sil
          </button>
          <input type="file" id="fileIn" onchange="importExcel(this)">
        </div>
      </div>
    </div>

    <!-- Export Kartı -->
    <div class="col">
      <div class="card h-100">
        <div class="card-header py-2">
          <small class="text-uppercase text-muted fw-bold">
            <i class="bi bi-box-arrow-up me-1"></i>Dışa Aktar
          </small>
        </div>
        <div class="card-body">
          <!-- Boyut -->
          <div class="d-flex align-items-center gap-2 mb-2 flex-wrap">
            <span class="text-muted small fw-bold" style="min-width:100px;"><i class="bi bi-aspect-ratio me-1"></i>Boyut</span>
            <input type="number" class="form-control form-control-sm" id="wI" value="1920" style="width:80px;">
            <span class="text-muted">×</span>
            <input type="number" class="form-control form-control-sm" id="hI" value="1080" style="width:80px;">
            <span class="text-muted small">px</span>
          </div>
          <hr class="my-2">
          <!-- İçerik + İndirme yöntemi -->
          <div class="d-flex align-items-center gap-2 mb-2 flex-wrap">
            <span class="text-muted small fw-bold" style="min-width:100px;"><i class="bi bi-collection me-1"></i>İçerik</span>
            <select class="form-select form-select-sm" id="downloadMode" style="max-width:200px;">
              <option value="both">Soru + Cevaplı</option>
              <option value="onlyQ">Sadece Soru</option>
              <option value="onlyA">Sadece Cevaplı</option>
            </select>
            <!-- İndirme yöntemi dropdown -->
            <div class="dropdown">
              <button class="btn btn-secondary btn-sm dropdown-toggle" data-bs-toggle="dropdown">
                <i class="bi bi-download"></i> İndirme Yöntemi
              </button>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#" onclick="setDlMethod('zip')"><i class="bi bi-file-zip me-2"></i>ZIP olarak indir</a></li>
                <li><a class="dropdown-item" href="#" onclick="setDlMethod('single')"><i class="bi bi-files me-2"></i>Tek tek indir</a></li>
              </ul>
            </div>
            <span id="dlLabel" class="badge bg-secondary">📦 ZIP</span>
          </div>
          <hr class="my-2">
          <!-- Aktar butonları -->
          <div class="d-flex align-items-center gap-2 flex-wrap">
            <span class="text-muted small fw-bold" style="min-width:100px;"><i class="bi bi-send me-1"></i>Aktar</span>
            <button class="btn btn-primary btn-sm" onclick="processAll('image')">
              <i class="bi bi-image"></i> Görsel İndir
            </button>
            <button class="btn btn-danger btn-sm" onclick="processAll('video')">
              <i class="bi bi-camera-video"></i> MP4 İndir
            </button>
            <div class="d-flex align-items-center gap-1">
              <i class="bi bi-stopwatch text-muted small"></i>
              <input type="number" class="form-control form-control-sm" id="vidDuration" value="5" min="1" max="60" style="width:56px;">
              <span class="text-muted small">sn</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ 2. Önizleme ══ -->
  <div class="preview-wrapper mb-3">
    <div id="liveEditor" class="live-editor-container">
      <div class="q-capsule">
        <div id="liveQ" class="q-editable" contenteditable="true" data-ph="Soruyu buraya yazın..."></div>
      </div>
      <div class="opt-grid">
        <div class="opt-box" id="live-box-a"><div class="opt-circle">A</div><div id="liveA" class="opt-editable" contenteditable="true" data-ph="A şıkkı"></div></div>
        <div class="opt-box" id="live-box-b"><div class="opt-circle">B</div><div id="liveB" class="opt-editable" contenteditable="true" data-ph="B şıkkı"></div></div>
        <div class="opt-box" id="live-box-c"><div class="opt-circle">C</div><div id="liveC" class="opt-editable" contenteditable="true" data-ph="C şıkkı"></div></div>
        <div class="opt-box" id="live-box-d"><div class="opt-circle">D</div><div id="liveD" class="opt-editable" contenteditable="true" data-ph="D şıkkı"></div></div>
      </div>
    </div>
  </div>

  <!-- ══ 3. Form Barı ══ -->
  <div class="card mb-3">
    <div class="card-body py-2 d-flex align-items-center gap-2 flex-wrap">

      <!-- Doğru şık seçici: Bootstrap btn-group -->
      <span class="text-muted small fw-bold me-1">Doğru Şık:</span>
      <div class="btn-group correct-btn-group" role="group" id="correctBtnGroup">
        <button type="button" class="btn btn-light active" data-val="" onclick="setCorrect('')">
          — Belirsiz
        </button>
        <button type="button" class="btn btn-outline-success" data-val="a" onclick="setCorrect('a')">A</button>
        <button type="button" class="btn btn-outline-success" data-val="b" onclick="setCorrect('b')">B</button>
        <button type="button" class="btn btn-outline-success" data-val="c" onclick="setCorrect('c')">C</button>
        <button type="button" class="btn btn-outline-success" data-val="d" onclick="setCorrect('d')">D</button>
      </div>

      <div class="vr mx-1"></div>

      <button class="btn btn-success btn-sm" onclick="saveNew()" id="saveBtn">
        <i class="bi bi-plus-circle"></i> Kaydet
      </button>
      <button class="btn btn-info btn-sm text-white" onclick="doUpdate()" id="updateBtn" style="display:none;">
        <i class="bi bi-arrow-repeat"></i> Güncelle
      </button>
      <button class="btn btn-secondary btn-sm" onclick="cancelEdit()" id="cancelBtn" style="display:none;">
        <i class="bi bi-x"></i> İptal
      </button>

      <div class="ms-auto d-flex align-items-center gap-2">

        <!-- Font Dropdown (Bootstrap) -->
        <div class="dropdown">
          <button class="btn btn-outline-secondary btn-sm dropdown-toggle" id="fontDropBtn" data-bs-toggle="dropdown" data-bs-auto-close="outside">
            <i class="bi bi-type"></i>
            <span id="badgeQFont">Montserrat</span> <span class="text-muted" id="badgeQSize">52px</span>
            / <span id="badgeOptFont">Montserrat</span> <span class="text-muted" id="badgeOptSize">30px</span>
          </button>
          <div class="dropdown-menu p-3 font-dd-panel" style="width:520px; right:0; left:auto;">
            <div class="row g-3">
              <!-- Soru Metni -->
              <div class="col-6">
                <p class="text-uppercase text-muted small fw-bold mb-2">📝 Soru Metni</p>
                <div class="font-list" id="qFontList"></div>
                <div class="btn-group btn-group-sm mt-2" role="group">
                  <button class="btn btn-outline-primary active" id="qBoldBtn" onclick="toggleStyle('q','bold')"><b>B</b> Kalın</button>
                  <button class="btn btn-outline-secondary" id="qItalicBtn" onclick="toggleStyle('q','italic')"><i>I</i> İtalik</button>
                </div>
                <div class="d-flex align-items-center gap-2 mt-2 pt-2 border-top">
                  <span class="text-muted small">Punto</span>
                  <input type="range" class="form-range flex-grow-1" id="qSizeSlider" min="24" max="96" value="52" oninput="onSizeChange('q')">
                  <span class="badge bg-secondary" id="qSizeVal">52px</span>
                </div>
              </div>
              <!-- Şıklar -->
              <div class="col-6">
                <p class="text-uppercase text-muted small fw-bold mb-2">🅰️ Şıklar</p>
                <div class="font-list" id="optFontList"></div>
                <div class="btn-group btn-group-sm mt-2" role="group">
                  <button class="btn btn-outline-primary active" id="optBoldBtn" onclick="toggleStyle('opt','bold')"><b>B</b> Kalın</button>
                  <button class="btn btn-outline-secondary" id="optItalicBtn" onclick="toggleStyle('opt','italic')"><i>I</i> İtalik</button>
                </div>
                <div class="d-flex align-items-center gap-2 mt-2 pt-2 border-top">
                  <span class="text-muted small">Punto</span>
                  <input type="range" class="form-range flex-grow-1" id="optSizeSlider" min="14" max="72" value="30" oninput="onSizeChange('opt')">
                  <span class="badge bg-secondary" id="optSizeVal">30px</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Arka plan -->
        <button class="btn btn-outline-secondary btn-sm" onclick="document.getElementById('bgInput').click()">
          <i class="bi bi-image"></i> Arka Plan
        </button>
        <input type="file" id="bgInput" accept="image/*" onchange="handleBg(this)">
      </div>
    </div>
  </div>

  <!-- ══ 4. Soru Listesi ══ -->
  <div class="card">
    <div class="card-header py-2">
      <small class="text-uppercase text-muted fw-bold"><i class="bi bi-list-ul me-1"></i>Soru Listesi</small>
    </div>
    <div class="card-body p-0">
      <table class="table table-hover table-dark mb-0">
        <thead>
          <tr>
            <th width="40"><input type="checkbox" class="form-check-input" onclick="toggleAll(this)"></th>
            <th>Soru Metni</th>
            <th width="90" class="text-end">İşlem</th>
          </tr>
        </thead>
        <tbody id="listBody"></tbody>
      </table>
    </div>
  </div>

</div><!-- /container -->

<!-- Render alanı (ekran dışı) -->
<div id="render-stage">
  <div id="render-box" style="width:1920px;height:1080px;background-color:#2d3748;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:80px;box-sizing:border-box;background-size:cover;background-position:center;">
    <div style="background:#fff;width:75%;padding:40px 80px;border-radius:80px;border:8px solid #1e293b;margin-bottom:50px;">
      <div id="r-q" style="font-weight:900;color:#000;text-align:center;word-break:break-word;white-space:pre-wrap;line-height:1.25;"></div>
    </div>
    <div style="width:82%;display:grid;grid-template-columns:1fr 1fr;gap:30px;">
      <div id="box-a" style="border:6px solid #cbd5e1;border-radius:80px;display:flex;align-items:flex-start;padding:22px 42px;background:#fff;min-height:90px;">
        <div style="width:70px;height:70px;font-size:35px;border:2px solid #000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;margin-right:22px;flex-shrink:0;color:#000;margin-top:4px;">A</div>
        <div id="r-a" style="font-weight:700;color:#000;word-break:break-word;white-space:pre-wrap;line-height:1.3;padding-top:8px;"></div>
      </div>
      <div id="box-b" style="border:6px solid #cbd5e1;border-radius:80px;display:flex;align-items:flex-start;padding:22px 42px;background:#fff;min-height:90px;">
        <div style="width:70px;height:70px;font-size:35px;border:2px solid #000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;margin-right:22px;flex-shrink:0;color:#000;margin-top:4px;">B</div>
        <div id="r-b" style="font-weight:700;color:#000;word-break:break-word;white-space:pre-wrap;line-height:1.3;padding-top:8px;"></div>
      </div>
      <div id="box-c" style="border:6px solid #cbd5e1;border-radius:80px;display:flex;align-items:flex-start;padding:22px 42px;background:#fff;min-height:90px;">
        <div style="width:70px;height:70px;font-size:35px;border:2px solid #000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;margin-right:22px;flex-shrink:0;color:#000;margin-top:4px;">C</div>
        <div id="r-c" style="font-weight:700;color:#000;word-break:break-word;white-space:pre-wrap;line-height:1.3;padding-top:8px;"></div>
      </div>
      <div id="box-d" style="border:6px solid #cbd5e1;border-radius:80px;display:flex;align-items:flex-start;padding:22px 42px;background:#fff;min-height:90px;">
        <div style="width:70px;height:70px;font-size:35px;border:2px solid #000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;margin-right:22px;flex-shrink:0;color:#000;margin-top:4px;">D</div>
        <div id="r-d" style="font-weight:700;color:#000;word-break:break-word;white-space:pre-wrap;line-height:1.3;padding-top:8px;"></div>
      </div>
    </div>
  </div>
</div>
<canvas id="video-canvas"></canvas>

<script>
const FONTS=[
  {name:'Montserrat',label:'Montserrat'},{name:'Poppins',label:'Poppins'},
  {name:'Nunito',label:'Nunito'},{name:'Raleway',label:'Raleway'},
  {name:'Oswald',label:'Oswald'},{name:'Bebas Neue',label:'Bebas Neue'},
  {name:'Anton',label:'Anton'},{name:'Playfair Display',label:'Playfair'},
  {name:'Roboto Condensed',label:'Roboto Cond.'},{name:'Inter',label:'Inter'},
];

let questions=JSON.parse(localStorage.getItem('pro_questions'))||[];
let savedBg=localStorage.getItem('pro_bg')||'';
let editingIdx=null;
let dlMethod='zip';
let correctVal=''; // seçili doğru şık

let fs=JSON.parse(localStorage.getItem('pro_fonts2')||'null')||{
  qFont:'Montserrat',qItalic:false,qBold:true,qSize:52,
  optFont:'Montserrat',optItalic:false,optBold:true,optSize:30
};

// ── Doğru Şık Seçici ──
function setCorrect(val) {
  correctVal = val;
  // Btn group güncelle
  document.querySelectorAll('#correctBtnGroup .btn').forEach(btn => {
    const bVal = btn.dataset.val;
    btn.classList.remove('btn-light','btn-success','btn-outline-success','active');
    if (bVal === val) {
      // Seçili: success (doğru şık varsa) veya light (belirsiz)
      btn.classList.add(val === '' ? 'btn-light' : 'btn-success', 'active');
    } else if (bVal === '') {
      btn.classList.add('btn-outline-secondary');
    } else {
      btn.classList.add('btn-outline-success');
    }
  });
  // Preview şık kutularını güncelle
  ['a','b','c','d'].forEach(l => {
    const box = document.getElementById('live-box-'+l);
    box.classList.remove('correct','light-mode');
    if (val === '') box.classList.add('light-mode');
    else if (l === val) box.classList.add('correct');
  });
}

// Başlangıçta belirsiz
setCorrect('');

// ── Font Sistemi ──
function buildFontLists(){
  ['q','opt'].forEach(t=>{
    document.getElementById(t+'FontList').innerHTML=FONTS.map(f=>`
      <div class="font-opt ${fs[t+'Font']===f.name?'active':''}" data-font="${f.name}"
           style="font-family:'${f.name}'" onclick="selectFont('${t}','${f.name}',this)">
        <span class="pchar" style="font-family:'${f.name}'">Aa</span>${f.label}
      </div>`).join('');
  });
}
function selectFont(t,name,el){
  fs[t+'Font']=name;
  el.closest('.font-list').querySelectorAll('.font-opt').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  saveFonts();applyFonts();updateBadge();
}
function toggleStyle(t,style){
  const k=t+(style==='italic'?'Italic':'Bold');
  fs[k]=!fs[k];
  const btnId=t+(style==='italic'?'ItalicBtn':'BoldBtn');
  const btn=document.getElementById(btnId);
  if(fs[k]){
    btn.classList.remove('btn-outline-primary','btn-outline-secondary');
    btn.classList.add(style==='bold'?'btn-primary':'btn-secondary');
  } else {
    btn.classList.remove('btn-primary','btn-secondary');
    btn.classList.add(style==='bold'?'btn-outline-primary':'btn-outline-secondary');
  }
  saveFonts();applyFonts();
}
function onSizeChange(t){
  const v=parseInt(document.getElementById(t+'SizeSlider').value);
  fs[t+'Size']=v;
  document.getElementById(t+'SizeVal').innerText=v+'px';
  saveFonts();applyFonts();updateBadge();
}
function updateBadge(){
  document.getElementById('badgeQFont').innerText=fs.qFont;
  document.getElementById('badgeQSize').innerText=fs.qSize+'px';
  document.getElementById('badgeOptFont').innerText=fs.optFont;
  document.getElementById('badgeOptSize').innerText=fs.optSize+'px';
}
function applyFonts(){
  const qFam="'"+fs.qFont+"',sans-serif";
  const oFam="'"+fs.optFont+"',sans-serif";
  const previewW=document.querySelector('.preview-wrapper')?.offsetWidth||800;
  const scale=previewW/1920;
  const qPx=(fs.qSize*scale).toFixed(1)+'px';
  const oPx=(fs.optSize*scale).toFixed(1)+'px';
  const qSt=fs.qItalic?'italic':'normal'; const qW=fs.qBold?'900':'400';
  const oSt=fs.optItalic?'italic':'normal'; const oW=fs.optBold?'700':'400';
  const lq=document.getElementById('liveQ');
  lq.style.cssText+=`;font-family:${qFam};font-size:${qPx};font-style:${qSt};font-weight:${qW};`;
  ['liveA','liveB','liveC','liveD'].forEach(id=>{
    const e=document.getElementById(id);
    e.style.cssText+=`;font-family:${oFam};font-size:${oPx};font-style:${oSt};font-weight:${oW};`;
  });
  const rq=document.getElementById('r-q');
  rq.style.fontFamily=qFam;rq.style.fontSize=fs.qSize+'px';rq.style.fontStyle=qSt;rq.style.fontWeight=qW;
  ['r-a','r-b','r-c','r-d'].forEach(id=>{
    const e=document.getElementById(id);
    e.style.fontFamily=oFam;e.style.fontSize=fs.optSize+'px';e.style.fontStyle=oSt;e.style.fontWeight=oW;
  });
}
function restoreFontUI(){
  document.getElementById('qSizeSlider').value=fs.qSize;
  document.getElementById('qSizeVal').innerText=fs.qSize+'px';
  document.getElementById('optSizeSlider').value=fs.optSize;
  document.getElementById('optSizeVal').innerText=fs.optSize+'px';
  // Bold butonları
  ['q','opt'].forEach(t=>{
    const bb=document.getElementById(t+'BoldBtn');
    const ib=document.getElementById(t+'ItalicBtn');
    if(fs[t+'Bold']){bb.classList.remove('btn-outline-primary');bb.classList.add('btn-primary');}
    if(fs[t+'Italic']){ib.classList.remove('btn-outline-secondary');ib.classList.add('btn-secondary');}
  });
  updateBadge();applyFonts();
}
function saveFonts(){localStorage.setItem('pro_fonts2',JSON.stringify(fs));}

// ── Arka Plan ──
function applyBg(src){savedBg=src;document.getElementById('liveEditor').style.backgroundImage=`url(${src})`;document.getElementById('render-box').style.backgroundImage=`url(${src})`;}
async function loadBgAsBase64(url){try{const res=await fetch(url,{cache:'force-cache'});const blob=await res.blob();return new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(blob);});}catch(e){return null;}}
if(savedBg){applyBg(savedBg);}else{loadBgAsBase64('background.jpg').then(b64=>{if(b64){localStorage.setItem('pro_bg',b64);applyBg(b64);}});}
function handleBg(input){const fr=new FileReader();fr.onload=e=>{localStorage.setItem('pro_bg',e.target.result);applyBg(e.target.result);};fr.readAsDataURL(input.files[0]);}

// ── İndirme Yöntemi ──
function setDlMethod(v){dlMethod=v;document.getElementById('dlLabel').innerText=v==='zip'?'📦 ZIP':'📄 Tek tek';}

// ── Progress ──
function setProgress(p,t){document.getElementById('progressFill').style.width=p+'%';document.getElementById('progressText').innerText=t;}
function showProgress(s){document.getElementById('progressOverlay').classList.toggle('active',s);}

// ── Form ──
const getEd=id=>document.getElementById(id).innerText.trim();
const setEd=(id,v)=>document.getElementById(id).innerText=v||'';
function clearForm(){['liveQ','liveA','liveB','liveC','liveD'].forEach(id=>setEd(id,''));setCorrect('');}
function getFormData(){return{Soru:getEd('liveQ'),A:getEd('liveA'),B:getEd('liveB'),C:getEd('liveC'),D:getEd('liveD'),Dogru:correctVal};}

function setEditMode(on){
  document.getElementById('saveBtn').style.display=on?'none':'inline-flex';
  document.getElementById('updateBtn').style.display=on?'inline-flex':'none';
  document.getElementById('cancelBtn').style.display=on?'inline-flex':'none';
}
function saveNew(){const q=getFormData();if(!q.Soru)return alert('Soru boş!');questions.push(q);save();clearForm();}
function doUpdate(){if(editingIdx===null)return;const q=getFormData();if(!q.Soru)return alert('Soru boş!');questions[editingIdx]=q;editingIdx=null;setEditMode(false);save();clearForm();}
function cancelEdit(){editingIdx=null;setEditMode(false);clearForm();}
function editQ(i){
  editingIdx=i;const q=questions[i];
  setEd('liveQ',q.Soru);setEd('liveA',q.A);setEd('liveB',q.B);setEd('liveC',q.C);setEd('liveD',q.D);
  setCorrect((q.Dogru||'').toLowerCase());
  setEditMode(true);window.scrollTo({top:0,behavior:'smooth'});
}
function deleteQ(i){if(confirm('Silinsin mi?')){questions.splice(i,1);save();}}
function toggleAll(src){document.querySelectorAll('.sel-q').forEach(cb=>cb.checked=src.checked);}
function clearAll(){if(confirm('Tüm sorular silinecek!')){questions=[];save();}}
function save(){localStorage.setItem('pro_questions',JSON.stringify(questions));renderTable();}
function renderTable(){
  document.getElementById('listBody').innerHTML=questions.map((q,i)=>`
    <tr class="q-row">
      <td><input type="checkbox" class="form-check-input sel-q" data-idx="${i}" onclick="event.stopPropagation()"></td>
      <td onclick="editQ(${i})" title="Düzenle">
        ${q.Dogru ? '<span class="badge bg-success me-2">'+q.Dogru.toUpperCase()+'</span>' : '<span class="badge bg-secondary me-2">?</span>'}
        ${(q.Soru||'').substring(0,110)}${(q.Soru||'').length>110?'...':''}
      </td>
      <td class="text-end">
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteQ(${i})">
          <i class="bi bi-trash3"></i>
        </button>
      </td>
    </tr>`).join('');
}
function importExcel(input){const fr=new FileReader();fr.onload=e=>{const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});questions=[...questions,...XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]])];save();};fr.readAsArrayBuffer(input.files[0]);}
function exportToExcel(){const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(questions),'Sorular');XLSX.writeFile(wb,'Yedek_Sorular.xlsx');}

// ── Render ──
function updateRender(q,isCorr){
  document.getElementById('r-q').innerText=q.Soru||'';
  ['a','b','c','d'].forEach(l=>document.getElementById('r-'+l).innerText=q[l.toUpperCase()]||'');
  ['a','b','c','d'].forEach(l=>{
    const el=document.getElementById('box-'+l);
    el.style.borderColor='#cbd5e1';el.style.background='#fff';
    el.querySelector('div:first-child').style.color='#000';
    el.querySelector('div:first-child').style.borderColor='#000';
  });
  if(isCorr&&q.Dogru){
    const el=document.getElementById('box-'+q.Dogru.toLowerCase());
    if(el){
      el.style.borderColor='#198754'; // BS success
      el.style.background='#d1e7dd';
      const circle=el.querySelector('div:first-child');
      circle.style.color='#198754';
      circle.style.borderColor='#198754';
    }
  }
  applyFonts();
}

// ── İşlemci ──
async function processAll(type){
  const sel=document.querySelectorAll('.sel-q:checked');
  if(!sel.length)return alert('En az bir soru seçin!');
  showProgress(true);
  const zip=new JSZip();
  const dlMode=document.getElementById('downloadMode').value;
  const w=parseInt(document.getElementById('wI').value)||1920;
  const h=parseInt(document.getElementById('hI').value)||1080;
  const dur=parseInt(document.getElementById('vidDuration').value)||5;
  const total=sel.length*(dlMode==='both'?2:1);let done=0;
  for(let chk of sel){
    const q=questions[chk.dataset.idx];const qi=parseInt(chk.dataset.idx)+1;
    const run=async(isCorr,sfx)=>{
      setProgress(Math.round(done/total*95),`İşleniyor: Soru ${qi}${sfx?' (cevaplı)':''}...`);
      updateRender(q,isCorr);await sleep(300);
      let blob,fName;
      if(type==='image'){const cv=await html2canvas(document.getElementById('render-box'),{scale:1,useCORS:true,allowTaint:true,width:w,height:h,logging:false});blob=await canvasToBlob(cv,'image/jpeg',.95);fName=`soru_${qi}${sfx}.jpg`;}
      else{blob=await renderMp4(document.getElementById('render-box'),w,h,dur);fName=`soru_${qi}${sfx}.mp4`;}
      if(dlMethod==='zip')zip.file(fName,blob);else downloadBlob(blob,fName);done++;
    };
    if(dlMode==='onlyQ'||dlMode==='both')await run(false,'');
    if(dlMode==='onlyA'||dlMode==='both')await run(true,'_cevap');
  }
  if(dlMethod==='zip'){setProgress(98,'ZIP hazırlanıyor...');downloadBlob(await zip.generateAsync({type:'blob'}),`Export_${type}.zip`);}
  showProgress(false);
}
function downloadBlob(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},1500);}
const canvasToBlob=(c,t,q)=>new Promise(r=>c.toBlob(r,t,q));
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

async function renderMp4(element,w,h,durationSec){
  if(typeof VideoEncoder==='undefined')return renderWebmFallback(element,w,h,durationSec*1000);
  const src=await html2canvas(element,{scale:1,useCORS:true,allowTaint:true,width:w,height:h,logging:false});
  const{Muxer,ArrayBufferTarget}=Mp4Muxer;
  const target=new ArrayBufferTarget();
  const muxer=new Muxer({target,video:{codec:'avc',width:w,height:h},fastStart:'in-memory'});
  const fps=30,tot=durationSec*fps,dur=Math.round(1_000_000/fps);
  const enc=new VideoEncoder({output:(chunk,meta)=>muxer.addVideoChunk(chunk,meta),error:e=>console.error(e)});
  enc.configure({codec:'avc1.42001f',width:w,height:h,bitrate:8_000_000,framerate:fps});
  const off=document.createElement('canvas');off.width=w;off.height=h;const ctx=off.getContext('2d');
  for(let i=0;i<tot;i++){ctx.drawImage(src,0,0,w,h);const vf=new VideoFrame(off,{timestamp:i*dur,duration:dur});enc.encode(vf,{keyFrame:i%(fps*2)===0});vf.close();if(i%fps===0)await sleep(0);}
  await enc.flush();muxer.finalize();
  return new Blob([target.buffer],{type:'video/mp4'});
}
function renderWebmFallback(element,w,h,durationMs){
  return new Promise(async(resolve,reject)=>{
    const mime=['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'].find(t=>MediaRecorder.isTypeSupported(t));
    if(!mime)return reject(new Error('Video desteklenmiyor'));
    const src=await html2canvas(element,{scale:1,useCORS:true,allowTaint:true,width:w,height:h,logging:false});
    const wc=document.getElementById('video-canvas');wc.width=w;wc.height=h;
    const ctx=wc.getContext('2d');ctx.drawImage(src,0,0,w,h);
    const stream=wc.captureStream(30);const rec=new MediaRecorder(stream,{mimeType:mime});const chunks=[];
    rec.ondataavailable=e=>{if(e.data?.size>0)chunks.push(e.data);};
    rec.onstop=()=>{stream.getTracks().forEach(t=>t.stop());resolve(new Blob(chunks,{type:mime}));};
    rec.onerror=reject;rec.start();
    let cnt=0,last=performance.now(),tot=Math.ceil((durationMs/1000)*30);
    function tick(now){if(now-last>=33){ctx.drawImage(src,0,0,w,h);ctx.fillStyle='rgba(0,0,0,0.003)';ctx.fillRect(0,0,1,1);last=now;cnt++;}if(cnt<tot)requestAnimationFrame(tick);else rec.stop();}
    requestAnimationFrame(tick);
  });
}

buildFontLists();
restoreFontUI();
renderTable();
window.addEventListener('resize',applyFonts);
