<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Pro Soru Stüdyosu v8</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- mp4-muxer: hafif, FFmpeg gerektirmez, saf JS MP4 yazıcı -->
    <script src="https://cdn.jsdelivr.net/npm/mp4-muxer@latest/build/mp4-muxer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e293b; --success: #22c55e; --accent: #6366f1; --danger: #ef4444; --pink: #ec4899; }
        body { font-family: 'Inter', sans-serif; background: #0f172a; margin: 0; padding: 20px; color: white; }
        .main-container { max-width: 1400px; margin: auto; }
        
        .admin-panel { background: #1e293b; padding: 20px; border-radius: 20px; margin-bottom: 25px; display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 20px; border: 1px solid #334155; }
        .panel-col { display: flex; flex-direction: column; gap: 10px; }
        h3 { margin: 0; font-size: 0.85rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }

        .preview-wrapper { width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 15px; overflow: hidden; position: relative; border: 2px solid #4f46e5; margin-bottom: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
        .live-editor-container { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 5%; box-sizing: border-box; background-size: cover; background-position: center; }
        
        .q-capsule { background: #ffffff; width: 85%; padding: 2% 5%; border-radius: 100px; border: 4px solid var(--primary); margin-bottom: 3%; }
        .q-input-live { background: transparent; border: none; width: 100%; font-size: 2.2vw; font-weight: 900; color: #000; text-align: center; outline: none; }
        
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 85%; }
        .opt-box { background: #ffffff; border: 3px solid #cbd5e1; border-radius: 100px; display: flex; align-items: center; padding: 1% 3%; min-height: 60px; }
        .opt-letter { width: 35px; height: 35px; border: 2px solid #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1vw; font-weight: 900; margin-right: 12px; color: #000; flex-shrink: 0; }
        .opt-input-live { background: transparent; border: none; width: 100%; font-size: 1.2vw; font-weight: 700; color: #000; outline: none; }

        .data-card { background: #1e293b; border-radius: 20px; padding: 20px; border: 1px solid #334155; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        tr.q-row:hover { background: rgba(255,255,255,0.05); cursor: pointer; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-g { background: var(--success); }
        .btn-p { background: var(--accent); }
        .btn-d { background: var(--danger); }
        .btn-v { background: var(--pink); }
        
        input, select { background: #0f172a; color: white; border: 1px solid #334155; padding: 8px; border-radius: 8px; }

        #progressOverlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.85); z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center; gap: 16px;
        }
        #progressOverlay.active { display: flex; }
        #progressBar { width: 420px; height: 14px; background: #334155; border-radius: 999px; overflow: hidden; }
        #progressFill { height: 100%; background: var(--pink); border-radius: 999px; transition: width 0.15s; width: 0%; }
        #progressText { color: white; font-size: 0.95rem; }

        #render-stage {
            position: fixed; left: -9999px; top: 0;
            width: 1920px; height: 1080px;
            pointer-events: none; visibility: visible;
        }
        #video-canvas { position: fixed; left: -9999px; top: 0; display: block; }
    </style>
</head>
<body>

<div id="progressOverlay">
    <div id="progressText">Hazırlanıyor...</div>
    <div id="progressBar"><div id="progressFill"></div></div>
</div>

<div class="main-container">
    <div class="admin-panel">
        <div class="panel-col">
            <h3>📂 Veri & Excel</h3>
            <button class="btn btn-p" onclick="document.getElementById('fileIn').click()">📥 Excel Yükle</button>
            <button class="btn btn-p" onclick="exportToExcel()" style="background:#475569">📤 Excel Yedek</button>
            <button class="btn btn-d" onclick="clearAll()">🗑 Temizle</button>
            <input type="file" id="fileIn" hidden onchange="importExcel(this)">
        </div>
        
        <div class="panel-col">
            <h3>🎨 Tasarım Ayarları</h3>
            <input type="file" id="bgInput" accept="image/*" onchange="handleBg(this)">
            <div style="display:flex; gap:5px;">
                <input type="number" id="wI" value="1920" style="width:50%" title="Genişlik">
                <input type="number" id="hI" value="1080" style="width:50%" title="Yükseklik">
            </div>
            <select id="exportType">
                <option value="zip">📦 Toplu İndir (ZIP)</option>
                <option value="single">⬇️ Tek Tek İndir</option>
            </select>
        </div>

        <div class="panel-col">
            <h3>⚙️ Kayıt & Dışa Aktar</h3>
            <div style="display:flex; gap:5px;">
                <select id="inCorrect" style="flex:1;">
                    <option value="">Cevap?</option>
                    <option value="a">A</option><option value="b">B</option>
                    <option value="c">C</option><option value="d">D</option>
                </select>
                <button class="btn btn-g" onclick="addOrUpdate()" id="saveBtn">✅ Kaydet</button>
            </div>
            <select id="downloadMode">
                <option value="both">Soru + Cevaplı</option>
                <option value="onlyQ">Sadece Soru</option>
                <option value="onlyA">Sadece Cevaplı</option>
            </select>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                <button class="btn btn-p" onclick="processAll('image')">🖼️ Görsel</button>
                <button class="btn btn-v" onclick="processAll('video')">🎬 MP4 İndir</button>
            </div>
            <div style="font-size:0.75rem; color:#64748b; margin-top:2px;">
                ⏱ Video süresi: <input type="number" id="vidDuration" value="5" min="1" max="60" style="width:50px; padding:3px 6px; font-size:0.75rem;"> saniye
            </div>
        </div>
    </div>

    <div class="preview-wrapper">
        <div id="liveEditor" class="live-editor-container">
            <div class="q-capsule"><input type="text" id="liveQ" class="q-input-live" placeholder="Soru yazın..."></div>
            <div class="opt-grid">
                <div class="opt-box"><div class="opt-letter">A</div><input id="liveA" class="opt-input-live" placeholder="A şıkkı"></div>
                <div class="opt-box"><div class="opt-letter">B</div><input id="liveB" class="opt-input-live" placeholder="B şıkkı"></div>
                <div class="opt-box"><div class="opt-letter">C</div><input id="liveC" class="opt-input-live" placeholder="C şıkkı"></div>
                <div class="opt-box"><div class="opt-letter">D</div><input id="liveD" class="opt-input-live" placeholder="D şıkkı"></div>
            </div>
        </div>
    </div>

    <div class="data-card">
        <table>
            <thead><tr>
                <th width="40"><input type="checkbox" onclick="toggleAll(this)"></th>
                <th>Soru Metni</th>
                <th style="text-align:right">İşlem</th>
            </tr></thead>
            <tbody id="listBody"></tbody>
        </table>
    </div>
</div>

<!-- Ekran dışı render alanı -->
<div id="render-stage">
    <div id="render-box" class="live-editor-container" style="
        width:1920px; height:1080px; background-color:#2d3748;
        flex-direction:column; justify-content:center; align-items:center;
        padding:80px; box-sizing:border-box;
        background-size:cover; background-position:center;">
        <div class="q-capsule" style="padding:40px 60px; border-width:8px; width:75%; border-radius:100px; background:#fff; margin-bottom:50px;">
            <div id="r-q" style="font-size:55px; font-weight:900; color:#000; text-align:center;"></div>
        </div>
        <div class="opt-grid" style="width:80%; gap:30px; display:grid; grid-template-columns:1fr 1fr;">
            <div id="box-a" class="opt-box" style="min-height:90px; border-width:6px; border-radius:100px; display:flex; align-items:center; padding:20px 40px; background:#fff;">
                <div class="opt-letter" style="width:70px;height:70px;font-size:35px;border:2px solid #000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;margin-right:20px;flex-shrink:0;">A</div>
                <div id="r-a" style="font-size:32px; font-weight:700; color:#000;"></div>
            </div>
            <div id="box-b" class="opt-box" style="min-height:90px; border-width:6px; border-radius:100px; display:flex; align-items:center; padding:20px 40px; background:#fff;">
                <div class="opt-letter" style="width:70px;height:70px;font-size:35px;border:2px solid #000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;margin-right:20px;flex-shrink:0;">B</div>
                <div id="r-b" style="font-size:32px; font-weight:700; color:#000;"></div>
            </div>
            <div id="box-c" class="opt-box" style="min-height:90px; border-width:6px; border-radius:100px; display:flex; align-items:center; padding:20px 40px; background:#fff;">
                <div class="opt-letter" style="width:70px;height:70px;font-size:35px;border:2px solid #000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;margin-right:20px;flex-shrink:0;">C</div>
                <div id="r-c" style="font-size:32px; font-weight:700; color:#000;"></div>
            </div>
            <div id="box-d" class="opt-box" style="min-height:90px; border-width:6px; border-radius:100px; display:flex; align-items:center; padding:20px 40px; background:#fff;">
                <div class="opt-letter" style="width:70px;height:70px;font-size:35px;border:2px solid #000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;margin-right:20px;flex-shrink:0;">D</div>
                <div id="r-d" style="font-size:32px; font-weight:700; color:#000;"></div>
            </div>
        </div>
    </div>
</div>

<canvas id="video-canvas"></canvas>

<script>
let questions = JSON.parse(localStorage.getItem('pro_questions')) || [];
let savedBg = localStorage.getItem('pro_bg') || "";
let editingIdx = null;

function applyBg(src) {
    savedBg = src;
    document.getElementById('liveEditor').style.backgroundImage = `url(${src})`;
    document.getElementById('render-box').style.backgroundImage = `url(${src})`;
}

// Arka planı base64'e çevirerek uygula (CORS / tainted canvas sorununu önler)
async function loadBgAsBase64(url) {
    try {
        const res = await fetch(url, { cache: 'force-cache' });
        const blob = await res.blob();
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = e => resolve(e.target.result);
            reader.readAsDataURL(blob);
        });
    } catch(e) {
        console.warn('Arka plan yüklenemedi:', e);
        return null;
    }
}

if(savedBg) {
    // localStorage'da zaten base64 kayıtlı
    applyBg(savedBg);
} else {
    // İlk yükleme: background.jpg'yi base64'e çevir ve kaydet
    loadBgAsBase64('background.jpg').then(b64 => {
        if(b64) {
            localStorage.setItem('pro_bg', b64);
            applyBg(b64);
        }
    });
}

function handleBg(input) {
    const reader = new FileReader();
    reader.onload = e => {
        localStorage.setItem('pro_bg', e.target.result);
        applyBg(e.target.result);
    };
    reader.readAsDataURL(input.files[0]);
}

function setProgress(pct, text) {
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').innerText = text;
}
function showProgress(show) {
    document.getElementById('progressOverlay').classList.toggle('active', show);
}

function addOrUpdate() {
    const q = {
        Soru: document.getElementById('liveQ').value,
        A: document.getElementById('liveA').value,
        B: document.getElementById('liveB').value,
        C: document.getElementById('liveC').value,
        D: document.getElementById('liveD').value,
        Dogru: document.getElementById('inCorrect').value
    };
    if(!q.Soru) return alert("Soru boş olamaz!");
    if(editingIdx !== null) {
        questions[editingIdx] = q; editingIdx = null;
        document.getElementById('saveBtn').innerText = "✅ Kaydet";
    } else {
        questions.push(q);
    }
    save(); resetForm();
}

function resetForm() {
    ["liveQ","liveA","liveB","liveC","liveD","inCorrect"].forEach(id => document.getElementById(id).value = "");
    editingIdx = null;
}

function editQ(i) {
    editingIdx = i;
    const q = questions[i];
    document.getElementById('liveQ').value = q.Soru;
    document.getElementById('liveA').value = q.A;
    document.getElementById('liveB').value = q.B;
    document.getElementById('liveC').value = q.C;
    document.getElementById('liveD').value = q.D;
    document.getElementById('inCorrect').value = (q.Dogru || "").toLowerCase();
    document.getElementById('saveBtn').innerText = "🔄 Güncelle";
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function save() { localStorage.setItem('pro_questions', JSON.stringify(questions)); renderTable(); }

function renderTable() {
    document.getElementById('listBody').innerHTML = questions.map((q, i) => `
        <tr class="q-row">
            <td><input type="checkbox" class="sel-q" data-idx="${i}" onclick="event.stopPropagation()"></td>
            <td onclick="editQ(${i})">${(q.Soru || '').substring(0, 100)}...</td>
            <td style="text-align:right">
                <button style="background:#ef4444;color:white;border:none;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;" onclick="event.stopPropagation(); deleteQ(${i})">🗑️</button>
            </td>
        </tr>
    `).join('');
}

function deleteQ(i) { if(confirm("Silinsin mi?")) { questions.splice(i, 1); save(); } }
function toggleAll(src) { document.querySelectorAll('.sel-q').forEach(cb => cb.checked = src.checked); }
function clearAll() { if(confirm("Tümü silinecek!")) { questions = []; save(); } }

function importExcel(input) {
    const reader = new FileReader();
    reader.onload = e => {
        const workbook = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        const data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
        questions = [...questions, ...data];
        save();
    };
    reader.readAsArrayBuffer(input.files[0]);
}

function exportToExcel() {
    const ws = XLSX.utils.json_to_sheet(questions);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Sorular");
    XLSX.writeFile(wb, "Yedek_Sorular.xlsx");
}

// ─── ANA İŞLEMCİ ─────────────────────────────────────────
async function processAll(type) {
    const selected = document.querySelectorAll('.sel-q:checked');
    if(!selected.length) return alert("Lütfen en az bir soru seçin!");

    showProgress(true);
    const zip = new JSZip();
    const exportMode = document.getElementById('exportType').value;
    const dlMode = document.getElementById('downloadMode').value;
    const w = parseInt(document.getElementById('wI').value) || 1920;
    const h = parseInt(document.getElementById('hI').value) || 1080;
    const durSec = parseInt(document.getElementById('vidDuration').value) || 5;

    const steps = (dlMode === 'both') ? 2 : 1;
    const total = selected.length * steps;
    let done = 0;

    for(let chk of selected) {
        const q = questions[chk.dataset.idx];
        const qIdx = parseInt(chk.dataset.idx) + 1;

        const runStep = async (isCorr, suffix) => {
            setProgress(Math.round(done / total * 95), `İşleniyor ${qIdx}${suffix}...`);
            updateRender(q, isCorr);
            await sleep(250); // DOM render bekle

            let blob, fName;
            if(type === 'image') {
                const canvas = await html2canvas(document.getElementById('render-box'), {
                    scale:1, useCORS:true, allowTaint:true, width:w, height:h, logging:false
                });
                blob = await canvasToBlob(canvas, 'image/jpeg', 0.95);
                fName = `soru_${qIdx}${suffix}.jpg`;
            } else {
                blob = await renderMp4(document.getElementById('render-box'), w, h, durSec);
                fName = `soru_${qIdx}${suffix}.mp4`;
            }

            if(exportMode === 'zip') zip.file(fName, blob);
            else downloadBlob(blob, fName);
            done++;
        };

        if(dlMode === 'onlyQ' || dlMode === 'both') await runStep(false, '');
        if(dlMode === 'onlyA' || dlMode === 'both') await runStep(true, '_cevap');
    }

    if(exportMode === 'zip') {
        setProgress(98, 'ZIP hazırlanıyor...');
        const content = await zip.generateAsync({ type:'blob' });
        downloadBlob(content, `Export_${type}.zip`);
    }

    showProgress(false);
}

function updateRender(q, isCorr) {
    document.getElementById('r-q').innerText = q.Soru || '';
    document.getElementById('r-a').innerText = q.A || '';
    document.getElementById('r-b').innerText = q.B || '';
    document.getElementById('r-c').innerText = q.C || '';
    document.getElementById('r-d').innerText = q.D || '';
    ['a','b','c','d'].forEach(l => {
        const el = document.getElementById(`box-${l}`);
        el.style.borderColor = "#cbd5e1";
        el.style.background = "#fff";
    });
    if(isCorr && q.Dogru) {
        const el = document.getElementById(`box-${q.Dogru.toLowerCase()}`);
        if(el) { el.style.borderColor = "#22c55e"; el.style.background = "#f0fdf4"; }
    }
}

function downloadBlob(blob, name) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 1500);
}

const canvasToBlob = (c, t, q) => new Promise(r => c.toBlob(r, t, q));
const sleep = ms => new Promise(r => setTimeout(r, ms));

// ─── MP4 MOTORU (mp4-muxer + WebCodecs) ──────────────────
// Hiç dış indirme gerektirmez. Tarayıcı içinde H.264 encode eder.
async function renderMp4(element, w, h, durationSec) {

    // WebCodecs desteği var mı?
    if(typeof VideoEncoder === 'undefined') {
        // Fallback: WebM olarak kaydet (eski tarayıcılar)
        return await renderWebmFallback(element, w, h, durationSec * 1000);
    }

    // 1. html2canvas ile tek bir kaynak frame al
    const sourceCanvas = await html2canvas(element, {
        scale:1, useCORS:true, allowTaint:true, width:w, height:h, logging:false
    });

    // 2. mp4-muxer kurulumu
    const { Muxer, ArrayBufferTarget } = Mp4Muxer;
    const target = new ArrayBufferTarget();
    const muxer = new Muxer({
        target,
        video: { codec:'avc', width:w, height:h },
        fastStart: 'in-memory'
    });

    // 3. VideoEncoder kurulumu
    const fps = 30;
    const totalFrames = durationSec * fps;
    const frameDurationUs = Math.round(1_000_000 / fps); // mikrosaniye

    const encoder = new VideoEncoder({
        output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
        error: e => console.error('VideoEncoder error:', e)
    });

    encoder.configure({
        codec: 'avc1.42001f', // H.264 Baseline
        width: w,
        height: h,
        bitrate: 8_000_000,
        framerate: fps
    });

    // 4. Frame'leri encode et (hepsi aynı görüntü)
    const offscreen = document.createElement('canvas');
    offscreen.width = w;
    offscreen.height = h;
    const ctx = offscreen.getContext('2d');

    for(let i = 0; i < totalFrames; i++) {
        ctx.drawImage(sourceCanvas, 0, 0, w, h);
        const videoFrame = new VideoFrame(offscreen, {
            timestamp: i * frameDurationUs,
            duration: frameDurationUs
        });
        encoder.encode(videoFrame, { keyFrame: i % (fps * 2) === 0 });
        videoFrame.close();
        // UI'nın donmaması için her 30 frame'de bir bekle
        if(i % fps === 0) await sleep(0);
    }

    // 5. Encoder'ı kapat ve mux et
    await encoder.flush();
    muxer.finalize();

    const { buffer } = target;
    return new Blob([buffer], { type: 'video/mp4' });
}

// Eski tarayıcılar için WebM fallback
function renderWebmFallback(element, w, h, durationMs) {
    return new Promise(async (resolve, reject) => {
        const mimeType = ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm']
            .find(t => MediaRecorder.isTypeSupported(t));
        if(!mimeType) return reject(new Error('Video kaydı desteklenmiyor'));

        const sourceCanvas = await html2canvas(element, {
            scale:1, useCORS:true, allowTaint:true, width:w, height:h, logging:false
        });

        const workCanvas = document.getElementById('video-canvas');
        workCanvas.width = w; workCanvas.height = h;
        const ctx = workCanvas.getContext('2d');
        ctx.drawImage(sourceCanvas, 0, 0, w, h);

        const stream = workCanvas.captureStream(30);
        const recorder = new MediaRecorder(stream, { mimeType });
        const chunks = [];

        recorder.ondataavailable = e => { if(e.data?.size > 0) chunks.push(e.data); };
        recorder.onstop = () => {
            stream.getTracks().forEach(t => t.stop());
            resolve(new Blob(chunks, { type: mimeType }));
        };
        recorder.onerror = reject;
        recorder.start();

        const fps = 30, interval = 1000/fps;
        let count = 0, last = performance.now();
        const total = Math.ceil((durationMs/1000)*fps);

        function tick(now) {
            if(now - last >= interval) {
                ctx.drawImage(sourceCanvas, 0, 0, w, h);
                ctx.fillStyle = 'rgba(0,0,0,0.003)';
                ctx.fillRect(0, 0, 1, 1);
                last = now; count++;
            }
            if(count < total) requestAnimationFrame(tick);
            else recorder.stop();
        }
        requestAnimationFrame(tick);
    });
}

renderTable();
</script>
</body>
</html>
